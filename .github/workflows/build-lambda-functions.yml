name: Build Lambda functions

on:
  workflow_call:
    inputs:
      git_ref:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.git_ref }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.12

      - name: bun audit guard
        run: bun audit --audit-level critical
        working-directory: bun-packages

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: node-modules-cache
        with:
          path: bun-packages/node_modules
          key: ${{ runner.os }}-${{ hashFiles('bun-packages/bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: bun-packages
        if: steps.node-modules-cache.outputs.cache-hit != 'true'

      - name: Build
        run: |
          SHA=$(git log -1 '--format=format:%H')
          # bun run build --define:process.env.COMMIT_SHA=\\\"$SHA\\\"
          bun run build
        working-directory: bun-packages/packages/email-function

      - name: Store artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: email-function-dist
          path: bun-packages/packages/email-function/dist/
          retention-days: 1
