name: Auto-Fix

on:
  push:
    branches:
      - develop
    paths:
      - app/**

# This workflow won't be able to commit changes to workflow files. This will
# fail because it requires the workflows: write permission. However, this is
# not available with the default GITHUB_TOKEN. To allow this workflow to commit
# changes to workflow files, you would need to create a personal access token
# (PAT) with the necessary permissions and store it as a secret in your
# repository.
permissions:
  contents: write # Required for pushing commits

jobs:
  format:
    runs-on: ubuntu-24.04

    # Don't re-run when the bot itself pushed the formatting commit
    if: github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: "app/.nvmrc"

      - name: npm audit guard
        run: npm audit
        working-directory: app

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: node-modules-cache
        with:
          path: app/node_modules
          key: ${{ runner.os }}-${{ hashFiles('app/.nvmrc', 'app/package-lock.json', 'app/prisma/prisma.schema') }}

      - name: Install dependencies
        run: npm ci
        working-directory: app
        if: steps.node-modules-cache.outputs.cache-hit != 'true'

      - name: Run Prettier
        run: npx prettier --write .
        working-directory: app

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add app/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(format): auto-fix prettier"
          git push
