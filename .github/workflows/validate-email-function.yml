name: Validate email-function

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - .github/workflows/validate-email-function.yml
      - bun-packages/packages/email-function/**
      - bun-packages/biome.json
  push:
    branches:
      - develop
    paths:
      - .github/workflows/validate-email-function.yml
      - bun-packages/packages/email-function/**
      - bun-packages/biome.json

jobs:
  biome:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Biome
        uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51 # v2
        with:
          version: 1.5.3

      - name: Run Biome
        run: biome ci .
        working-directory: bun-packages/packages/email-function
